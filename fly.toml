app = "vitals-backend"
primary_region = "iad"

[build]

[env]
  API_PREFIX = "/api/v1"
  NODE_ENV = "production"
  PORT = "3000"

[processes]
  app = "node -r module-alias/register dist/server.js"
  worker = "node -r module-alias/register dist/worker.js"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1